<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sudoku</title>
    <style>

        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@100&display=swap');

        *{

            font-family:Arial, Helvetica, sans-serif;
        }

        .grid{

            border: 2px solid black;
        }

        header{

            text-align: center;
            font-size:x-large;
        }

        .container{

            justify-content: center;
            display: flex;
        }

        .cell{

            border: .5px solid rgb(146, 138, 138);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: x-large;
        }

        .controls{

            display: flex;
            justify-content: center;
        }

        .controls div{

            padding: 5px;
        }

        button{

            padding: 5px;
            font-size: medium;
        }

        .numbers{

            display: grid;
            border: 1px solid black;
            grid-template-rows: repeat(3 , 40px);
            grid-template-columns: repeat(3 , 40px);
            width: 120px;
            height: 120px;

        }

        .numbers div{

            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
    </style>
</head>
<body>
   
    <header>sudoku solver</header>
    <p></p>
    <div class="controls">
        <div><button id="solve">solve sudoku</button></div>
        <div><button id="clear">clear</button></div>
    </div>
    <p></p>
    <div class="container">
        <div class="grid"></div>
    </div>
    <p></p>
    <div class="container">
        <div class="numbers">
            <div>1</div>
            <div>2</div>
            <div>3</div>
            <div>4</div>
            <div>5</div>
            <div>6</div>
            <div>7</div>
            <div>8</div>
            <div>9</div>
        </div>
    </div>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="cell.js"></script>
    <script src="index.js"></script>
</body>
</html>
