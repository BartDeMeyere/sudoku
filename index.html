<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sudoku</title>
    <style>

        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@100&display=swap');

        *{

            font-family:Arial, Helvetica, sans-serif;
        }

        body{

            overflow: hidden;
        }

        .grid{

            border: 2px solid black;
        }

        header{

            text-align: center;
            font-size:x-large;
        }

        .container{

            justify-content: center;
            display: flex;
            padding: 5px;
        }

        .cell{

            border: .5px solid rgb(146, 138, 138);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: x-large;
        }

        .controls{

            display: flex;
            justify-content: center;
        }

        .controls div{

            padding: 5px;
        }

        button{

            padding: 5px;
            font-size: medium;
        }

        .cellpossibilities{

            display: flex;
            flex-direction:row;

        }

        .cellpossibilities div{

            display: flex;
            width: 30px;
            height: 30px;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color:blue;
            border:.5px solid lightgrey
        }           

        footer{

            display: flex;
            flex-direction: row;
            justify-content: center;
        }
    </style>
</head>
<body>
   
    <header>sudoku solver</header>
    <p></p>
    <div class="controls">
        <div><button id="visualize">visualize</button></div>
        <div><button id="clear">clear</button></div>
        <div><button id="solve">solve</button></div>
        <div><button id="clearcell">clr</button></div>
    </div>
    <p></p>
    <div class="container">
        <div class="grid"></div>
    </div>
    <p></p>
    <footer>
            <div class="container">
                <div class="cellpossibilities">
                </div>
            </div>
</footer>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="cell.js"></script>
    <script src="index.js"></script>
</body>
</html>
