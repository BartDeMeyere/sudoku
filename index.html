<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sudoku</title>
    <style>

        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@100&display=swap');

        *{

            font-family:Arial, Helvetica, sans-serif;
        }

        .grid{

            border: 2px solid black;
        }

        header{

            text-align: center;
            font-size:x-large;
        }

        .container{

            justify-content: center;
            display: flex;
        }

        .cell{

            border: .5px solid rgb(146, 138, 138);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: x-large;
        }

        .controls{

            display: flex;
            justify-content: center;
        }

        .controls div{

            padding: 5px;
        }

        button{

            padding: 5px;
            font-size-adjust: calc();
        }

    </style>
</head>
<body>
    <header>sudoku</header>
    <p></p>
    <div class="controls">
        <div><button id="solve">solve sudoku</button></div>
        <div><button id="clear">clear</button></div>
    </div>
    <p></p>
    <div class="container">
        <div class="grid"></div>
    </div>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="cell.js"></script>
    <script src="index.js"></script>
</body>
</html>
